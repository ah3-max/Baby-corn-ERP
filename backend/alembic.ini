# Alembic 設定檔
# 玉米筍跨境供應鏈 ERP — 資料庫遷移設定

[alembic]
# migration 腳本目錄
script_location = alembic

# 遷移版本檔案命名格式：<時間戳>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# 時區（用於生成版本號時間戳）
timezone = Asia/Taipei

# 版本目錄（單一資料夾）
version_locations = %(here)s/alembic/versions

# sqlalchemy.url 由 env.py 從環境變數動態覆寫，此處為 placeholder
sqlalchemy.url = postgresql://placeholder/placeholder

# 輸出編碼
output_encoding = utf-8

[post_write_hooks]
# 若安裝 black，自動格式化新生成的 migration 檔
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
