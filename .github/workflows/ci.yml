name: CI — Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend：語法檢查 + 型別驗證 ─────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: 設定 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 安裝依賴
        run: pip install -r requirements.txt ruff

      - name: Ruff 語法 + 風格檢查
        run: ruff check . --output-format github

  # ─── Backend：Docker Image 建置 ───────────────────────────────────
  backend-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-lint

    steps:
      - uses: actions/checkout@v4

      - name: 設定 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 建置 Backend Image（不推送）
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          tags: babycorn-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Frontend：型別檢查 + 建置 ────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: 設定 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 安裝依賴
        run: npm ci

      - name: TypeScript 型別檢查
        run: npx tsc --noEmit

      - name: Next.js Build
        env:
          # CI 環境下的假 URL，讓 build 能順利完成
          NEXT_PUBLIC_API_URL: http://localhost:8000
          BACKEND_URL: http://localhost:8000
          NEXTAUTH_SECRET: ci-dummy-secret-at-least-32-chars-long
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build
