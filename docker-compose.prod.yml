services:
  # ─── PostgreSQL 資料庫 ────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: babycorn_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # 正式環境不暴露 port，僅容器內部通訊
    # 若需從外部連線除錯，取消下面註解
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI 後端（Production）──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: babycorn_backend
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    volumes:
      - uploads_data:/app/uploads
    # 正式環境不對外暴露 port，由 Nginx 統一入口
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  # ─── Next.js 前端（Production Build）────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: babycorn_frontend
    restart: always
    environment:
      BACKEND_URL: http://backend:8000
      NODE_ENV: production
    # 正式環境不對外暴露 port，由 Nginx 統一入口
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy

  # ─── Nginx 反向代理（正式環境統一入口）────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: babycorn_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  # ─── 資料庫備份服務（正式環境，常駐執行）────────────────────
  backup:
    build:
      context: ./scripts
      dockerfile: Dockerfile.backup
    container_name: babycorn_backup
    restart: always
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_DIR: /backups
    volumes:
      - backup_data:/backups        # 備份存入 named volume
      - ./scripts/backup.sh:/backup.sh:ro
      - ./scripts/crontab.txt:/etc/crontabs/root:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
  backup_data:
